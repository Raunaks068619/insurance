allowBuilds:
  '@biomejs/biome': true
  better-sqlite3: true
  esbuild: true
# pnpm 11 reads project settings here (no longer from package.json's "pnpm" field).
# Packages allowed to run their install/build scripts:
#   better-sqlite3 → native module (prebuild-install / node-gyp) for the SQLite layer
#   esbuild        → vitest's bundler binary
#   @biomejs/biome → linter/formatter binary
onlyBuiltDependencies:
  - "@biomejs/biome"
  - better-sqlite3
  - esbuild
