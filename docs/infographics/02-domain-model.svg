<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="diamond" viewBox="0 0 12 12" refX="6" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M6 1L11 6L6 11L1 6Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="900" height="700" fill="#fafafa"/>

  <!-- title -->
  <text x="40" y="46" font-size="24" font-weight="700" fill="#1e293b">02 · Domain model — entities &amp; ownership</text>
  <text x="40" y="72" font-size="14" fill="#64748b">Who owns what. The bounded contexts are why state machines stay clean and the engine stays pure.</text>

  <!-- bounded contexts background -->
  <rect x="40" y="100" width="820" height="380" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="60" y="122" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1">ADJUDICATION CONTEXT — pure functions, no I/O</text>

  <!-- Member -->
  <g>
    <rect x="60" y="148" width="170" height="100" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="145" y="172" font-size="14" font-weight="700" fill="#3730a3" text-anchor="middle">Member</text>
    <line x1="76" y1="184" x2="214" y2="184" stroke="#c7d2fe" stroke-width="1"/>
    <text x="76" y="204" font-size="11" font-family="monospace" fill="#475569">id: string</text>
    <text x="76" y="220" font-size="11" font-family="monospace" fill="#475569">name: string</text>
    <text x="76" y="236" font-size="11" font-family="monospace" fill="#475569">dob: ISODate</text>
  </g>

  <!-- Policy -->
  <g>
    <rect x="280" y="148" width="200" height="180" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="380" y="172" font-size="14" font-weight="700" fill="#3730a3" text-anchor="middle">Policy</text>
    <line x1="296" y1="184" x2="464" y2="184" stroke="#c7d2fe" stroke-width="1"/>
    <text x="296" y="204" font-size="11" font-family="monospace" fill="#475569">id: string</text>
    <text x="296" y="220" font-size="11" font-family="monospace" fill="#475569">member_id: string</text>
    <text x="296" y="236" font-size="11" font-family="monospace" fill="#475569">period: { start, end }</text>
    <text x="296" y="252" font-size="11" font-family="monospace" fill="#475569">deductible_cents</text>
    <text x="296" y="268" font-size="11" font-family="monospace" fill="#475569">oop_max_cents</text>
    <text x="296" y="284" font-size="11" font-family="monospace" fill="#475569">rules: CoverageRule[]</text>
    <text x="296" y="312" font-size="10" fill="#94a3b8" font-style="italic">composes its rules</text>
  </g>

  <!-- CoverageRule -->
  <g>
    <rect x="530" y="148" width="200" height="180" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="630" y="172" font-size="14" font-weight="700" fill="#3730a3" text-anchor="middle">CoverageRule</text>
    <line x1="546" y1="184" x2="714" y2="184" stroke="#c7d2fe" stroke-width="1"/>
    <text x="546" y="204" font-size="11" font-family="monospace" fill="#475569">service_type: string</text>
    <text x="546" y="220" font-size="11" font-family="monospace" fill="#475569">covered: boolean</text>
    <text x="546" y="236" font-size="11" font-family="monospace" fill="#475569">limit_per_period_cents</text>
    <text x="546" y="252" font-size="11" font-family="monospace" fill="#475569">copay_cents</text>
    <text x="546" y="268" font-size="11" font-family="monospace" fill="#475569">coinsurance_pct</text>
    <text x="546" y="284" font-size="11" font-family="monospace" fill="#475569">prior_auth_required</text>
    <text x="546" y="312" font-size="10" fill="#94a3b8" font-style="italic">data, not DSL</text>
  </g>

  <!-- Accumulator (lower row) -->
  <g>
    <rect x="60" y="360" width="220" height="100" rx="8" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="170" y="384" font-size="14" font-weight="700" fill="#0f766e" text-anchor="middle">Accumulator</text>
    <line x1="76" y1="396" x2="264" y2="396" stroke="#99f6e4" stroke-width="1"/>
    <text x="76" y="416" font-size="11" font-family="monospace" fill="#475569">policy_id, period_start</text>
    <text x="76" y="432" font-size="11" font-family="monospace" fill="#475569">by_service_type: Record</text>
    <text x="76" y="448" font-size="11" font-family="monospace" fill="#475569">total_member_oop</text>
  </g>

  <!-- Adjudication -->
  <g>
    <rect x="320" y="360" width="220" height="100" rx="8" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="430" y="384" font-size="14" font-weight="700" fill="#0f766e" text-anchor="middle">Adjudication</text>
    <line x1="336" y1="396" x2="524" y2="396" stroke="#99f6e4" stroke-width="1"/>
    <text x="336" y="416" font-size="11" font-family="monospace" fill="#475569">line_item_id</text>
    <text x="336" y="432" font-size="11" font-family="monospace" fill="#475569">status, payable_cents</text>
    <text x="336" y="448" font-size="11" font-family="monospace" fill="#475569">reasons: ReasonCode[]</text>
  </g>

  <!-- Dispute -->
  <g>
    <rect x="580" y="360" width="220" height="100" rx="8" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="690" y="384" font-size="14" font-weight="700" fill="#0f766e" text-anchor="middle">Dispute</text>
    <line x1="596" y1="396" x2="784" y2="396" stroke="#99f6e4" stroke-width="1"/>
    <text x="596" y="416" font-size="11" font-family="monospace" fill="#475569">line_item_id</text>
    <text x="596" y="432" font-size="11" font-family="monospace" fill="#475569">reason: string</text>
    <text x="596" y="448" font-size="11" font-family="monospace" fill="#475569">resolution: string</text>
  </g>

  <!-- Claim section (separate context) -->
  <rect x="40" y="500" width="820" height="160" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="60" y="522" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1">SUBMISSION CONTEXT — the envelope members interact with</text>

  <!-- Claim -->
  <g>
    <rect x="60" y="548" width="220" height="96" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="170" y="572" font-size="14" font-weight="700" fill="#92400e" text-anchor="middle">Claim</text>
    <line x1="76" y1="584" x2="264" y2="584" stroke="#fde68a" stroke-width="1"/>
    <text x="76" y="604" font-size="11" font-family="monospace" fill="#475569">id, member_id, provider</text>
    <text x="76" y="620" font-size="11" font-family="monospace" fill="#475569">dx_code, date</text>
    <text x="76" y="636" font-size="11" font-family="monospace" fill="#475569">state (derived)</text>
  </g>

  <!-- LineItem -->
  <g>
    <rect x="320" y="548" width="220" height="96" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="430" y="572" font-size="14" font-weight="700" fill="#92400e" text-anchor="middle">LineItem</text>
    <line x1="336" y1="584" x2="524" y2="584" stroke="#fde68a" stroke-width="1"/>
    <text x="336" y="604" font-size="11" font-family="monospace" fill="#475569">id, claim_id</text>
    <text x="336" y="620" font-size="11" font-family="monospace" fill="#475569">service_type, units</text>
    <text x="336" y="636" font-size="11" font-family="monospace" fill="#475569">billed_amount_cents</text>
  </g>

  <!-- relationship arrows -->
  <!-- Member 1—N Policy -->
  <line x1="230" y1="198" x2="280" y2="198" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="255" y="190" font-size="10" fill="#64748b" text-anchor="middle">1:N</text>

  <!-- Policy 1—N CoverageRule -->
  <line x1="480" y1="238" x2="530" y2="238" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="505" y="230" font-size="10" fill="#64748b" text-anchor="middle">1:N</text>

  <!-- Policy → Accumulator -->
  <line x1="380" y1="328" x2="200" y2="360" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="270" y="346" font-size="10" fill="#64748b" font-style="italic">tracks usage</text>

  <!-- LineItem → Adjudication -->
  <line x1="430" y1="548" x2="430" y2="460" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="450" y="500" font-size="10" fill="#64748b" font-style="italic">produces 1:1</text>

  <!-- Claim → LineItem -->
  <line x1="280" y1="596" x2="320" y2="596" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="300" y="588" font-size="10" fill="#64748b" text-anchor="middle">1:N</text>

  <!-- Dispute → Adjudication (re-adjudicates) -->
  <line x1="690" y1="460" x2="690" y2="490" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="700" y="478" font-size="10" fill="#64748b" font-style="italic">reopens</text>

  <!-- footer -->
  <text x="40" y="690" font-size="12" fill="#64748b" font-style="italic">Adjudication context is pure. Submission context is transactional. The seam is the only place I/O happens.</text>
</svg>
